name: Matrix Hacker Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Matrix Snake
        uses: Platane/snk@v3
        with:
          github_user_name: nexordevs
          outputs: |
            dist/matrix.svg?palette=github-dark&color_snake=00F7FF&color_dots=0:05080f,0.25:001f2f,0.5:003f5c,0.75:00aaff,1:00F7FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
