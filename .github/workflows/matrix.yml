name: Matrix Hacker Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Matrix Snake
        uses: Platane/snk@v3
        with:
          github_user_name: nexordevs
          outputs: |
            dist/matrix.svg?palette=github-dark&color_snake=00F7FF&color_dots=0:05080f,0.25:001f2f,0.5:003f5c,0.75:00aaff,1:00F7FF

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
